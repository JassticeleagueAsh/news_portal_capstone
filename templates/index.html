<!DOCTYPE html>
<html>
<head>
    <title>News Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="p-4 bg-white shadow rounded">
            <h1 class="mb-3">Welcome to the News Portal</h1>
            <p class="text-muted">This is the landing page of the application.</p>

            {% if user.is_authenticated %}
                <div class="alert alert-success">
                    Logged in as <strong>{{ user.username }}</strong> ({{ user.role }})
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <a class="btn btn-primary" href="{% url 'dashboard' %}">Dashboard</a>
                    <a class="btn btn-outline-danger" href="{% url 'logout' %}">Logout</a>
                </div>
            {% else %}
                <div class="d-flex gap-2 flex-wrap">
                    <a class="btn btn-primary" href="{% url 'login' %}">Login</a>
                    <a class="btn btn-success" href="{% url 'register' %}">Register</a>
                    <a class="btn btn-outline-secondary" href="{% url 'article_list' %}">View Approved Articles</a>
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
