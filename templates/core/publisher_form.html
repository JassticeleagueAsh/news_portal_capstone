{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h1>Create Publisher</h1>

    <form method="post" class="mt-3">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Create Publisher</button>
        <a href="{% url 'editor_article_list' %}" class="btn btn-secondary">Back</a>
    </form>
</div>
{% endblock %}
