<!DOCTYPE html>
<html>
<head>
    <title>{{ article.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="bg-white p-4 shadow rounded">
            <div class="mb-3">
                <a class="btn btn-outline-secondary" href="{% url 'article_list' %}">Back to Articles</a>
            </div>

            <h1 class="mb-3">{{ article.title }}</h1>
            <p><strong>Author:</strong> {{ article.author.username }}</p>

            {% if article.publisher %}
                <p><strong>Publisher:</strong> {{ article.publisher.name }}</p>
            {% endif %}

            <p><strong>Created:</strong> {{ article.created_at }}</p>
            <hr>
            <p>{{ article.content }}</p>
        </div>
    </div>
</body>
</html>
